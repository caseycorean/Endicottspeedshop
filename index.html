<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Endicott Speed Shop | Weight Distribution Calculator</title>
  <meta
    name="description"
    content="Free car weight distribution calculator. See how battery relocation, engine setback, and weight reduction affect front-to-rear balance."
  />
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GGJVMS8CZD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-GGJVMS8CZD');
</script>

<style>
:root {
  --bg:#f3f5f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#355e8c;
  --border:#d8dde4;
}

body {
  margin:0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.container {
  max-width:900px;
  margin:auto;
  padding:16px;
}

.card {
  background:var(--card);
  border-radius:16px;
  padding:18px;
  margin-bottom:16px;
  border:1px solid var(--border);
}

h1, h2 {
  margin-top:0;
  color:var(--accent);
}

input {
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border);
  font-size:16px;
  box-sizing:border-box;
}

.mod-row {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap:10px;
}

.mod-row-wrap {
  border-top:1px solid #eef2f7;
  margin-top:12px;
  padding-top:12px;
}

.mod-head {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

button {
  cursor:pointer;
}

.add-btn {
  border:1px solid var(--accent);
  color:var(--accent);
  background:#fff;
  padding:10px;
  border-radius:10px;
  font-weight:600;
}

.remove-btn {
  border:1px solid var(--border);
  background:#fff;
  padding:6px 10px;
  border-radius:8px;
}

.label-with-info {
  display:flex;
  align-items:center;
  gap:6px;
}

.info-btn {
  border:1px solid var(--border);
  border-radius:50%;
  width:18px;
  height:18px;
  font-size:12px;
  background:#fff;
}

.tooltip {
  display:none;
  font-size:12px;
  color:var(--muted);
  margin-bottom:6px;
}

.result-box {
  font-size:22px;
  font-weight:600;
}

.logo {
  width:100%;
  max-width:600px;
  display:block;
  margin:auto;
}
</style>
</head>

<body>

<div class="container">

<div class="card" style="text-align:center;">
  <img src="logo-horizontal.png" class="logo">
</div>

<div class="card">
<h1>Weight Distribution Calculator</h1>

<div class="mod-row">
<div>
<label>Total Weight</label>
<input id="totalWeight" value="3600">
</div>

<div>
<label>Front %</label>
<input id="frontPct" value="57">
</div>

<div>
<label>Wheelbase (in)</label>
<input id="wheelbase" value="108">
</div>
</div>
</div>

<div class="card">
<h2>Modifications</h2>

<div id="modificationsContainer"></div>

<button class="add-btn" id="addComponentBtn">+ Add Component</button>

</div>

<div class="card">
<h2>Results</h2>
<div class="result-box" id="results">—</div>
</div>

</div>

<script>
let componentIndex = 0;

function createField(labelText, tooltipText, className, type="number", value="") {
  const wrapper = document.createElement("div");

  const labelWrap = document.createElement("div");
  labelWrap.className = "label-with-info";

  const label = document.createElement("label");
  label.textContent = labelText;

  const info = document.createElement("button");
  info.className = "info-btn";
  info.textContent = "i";

  const tip = document.createElement("div");
  tip.className = "tooltip";
  tip.textContent = tooltipText;

  info.onclick = () => {
    tip.style.display = tip.style.display === "block" ? "none" : "block";
  };

  labelWrap.appendChild(label);
  labelWrap.appendChild(info);

  const input = document.createElement("input");
  input.className = className;
  input.type = type;
  input.value = value;

  input.oninput = calculate;

  wrapper.appendChild(labelWrap);
  wrapper.appendChild(tip);
  wrapper.appendChild(input);

  return wrapper;
}

function addComponentRow(defaults = {}) {
  componentIndex++;

  const wrap = document.createElement("div");
  wrap.className = "mod-row-wrap";

  const head = document.createElement("div");
  head.className = "mod-head";

  const title = document.createElement("strong");
  title.textContent = "Component " + componentIndex;

  const remove = document.createElement("button");
  remove.className = "remove-btn";
  remove.textContent = "Remove";
  remove.onclick = () => {
    wrap.remove();
    calculate();
  };

  head.appendChild(title);
  head.appendChild(remove);

  const row = document.createElement("div");
  row.className = "mod-row";

  row.appendChild(createField("Component", "Name of part", "name", "text", defaults.name || ""));
  row.appendChild(createField("Orig Weight", "Original weight", "orig", "number", defaults.orig || ""));
  row.appendChild(createField("New Weight", "New weight", "new", "number", defaults.new || ""));
  row.appendChild(createField("From (in)", "From front axle", "from", "number", defaults.from || ""));
  row.appendChild(createField("To (in)", "To front axle", "to", "number", defaults.to || ""));

  wrap.appendChild(head);
  wrap.appendChild(row);

  document.getElementById("modificationsContainer").appendChild(wrap);
}

function calculate() {
  let total = 0;

  document.querySelectorAll(".mod-row-wrap").forEach(row => {
    const orig = parseFloat(row.querySelector(".orig")?.value) || 0;
    const newW = parseFloat(row.querySelector(".new")?.value) || 0;

    total += (newW - orig);
  });

  document.getElementById("results").textContent =
    "Net weight change: " + total.toFixed(1) + " lb";
}

document.getElementById("addComponentBtn").onclick = () => addComponentRow();

addComponentRow({name:"Battery", orig:40, new:40, from:140, to:-25});
addComponentRow({name:"Hood", orig:60, new:25, from:145, to:145});

calculate();
</script>

</body>
</html>
