<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-GGJVMS8CZD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-GGJVMS8CZD');
</script>
<title>Endicott Speed Shop | Weight Distribution Calculator</title>

<style>
:root {
  --bg:#f3f5f8;
  --card:#ffffff;
  --text:#1f2937;
  --muted:#6b7280;
  --accent:#355c8c;
  --border:#d8dde4;
}

body {
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.wrap {
  max-width:900px;
  margin:auto;
  padding:12px;
}

/* HEADER (reduced height) */
.header {
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  padding:10px;
  margin-bottom:12px;
}

.header img {
  width:100%;
  max-width:700px;
  display:block;
}

/* CARDS */
.card {
  background:white;
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

h2 {
  margin:0 0 10px;
  color:var(--accent);
  font-size:1.2rem;
}

/* INPUTS */
.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

input {
  width:100%;
  padding:10px;
  border:1px solid var(--border);
  border-radius:8px;
}

/* MOD ROW */
.mod-row {
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:10px;
}

/* RESULTS */
.results {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.result {
  background:#eef5ee;
  padding:10px;
  border-radius:10px;
}

@media(max-width:700px){

  .grid, .results {
    grid-template-columns:1fr;
  }

  .mod-row {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="wrap">

<!-- HEADER -->
<div class="header">
  <img src="horizontal-logo.png" alt="Endicott Speed Shop">
</div>

<!-- CALCULATOR FIRST -->
<div class="card">
  <h2>Weight Distribution Calculator</h2>

  <div class="grid">
    <input id="totalWeight" type="number" value="3600" placeholder="Total Weight">
    <input id="frontPct" type="number" value="57" placeholder="Front %">
    <input id="wheelbase" type="number" value="108" placeholder="Wheelbase">
  </div>
</div>

<!-- MODS -->
<div class="card">
  <h2>Modifications</h2>

  <div class="mod-row">
    <input id="orig1" type="number" value="40" placeholder="Orig Wt">
    <input id="new1" type="number" value="40" placeholder="New Wt">
    <input id="from1" type="number" value="140" placeholder="From">
    <input id="to1" type="number" value="-25" placeholder="To">
    <input id="name1" value="Battery">
  </div>

  <div class="mod-row">
    <input id="orig2" type="number" value="60">
    <input id="new2" type="number" value="25">
    <input id="from2" type="number" value="145">
    <input id="to2" type="number" value="145">
    <input id="name2" value="Hood">
  </div>

</div>

<!-- RESULTS -->
<div class="card">
  <h2>Results</h2>

  <div class="results">
    <div class="result" id="frontResult">--</div>
    <div class="result" id="changeResult">--</div>
    <div class="result" id="weightResult">--</div>
  </div>
</div>

<!-- EXPLANATION MOVED DOWN -->
<div class="card">
  <h2>What This Means</h2>
  <p>
    Small changes in weight location can shift balance significantly. 
    Even 1–2% can change how the car behaves.
  </p>
</div>

</div>

<script>
function val(id){
  return parseFloat(document.getElementById(id).value)||0;
}

function calc(){

  let total = val("totalWeight");
  let pct = val("frontPct")/100;
  let wb = val("wheelbase");

  let moment = total * pct * wb;

  let delta = (val("new1")*val("to1") - val("orig1")*val("from1"))
            + (val("new2")*val("to2") - val("orig2")*val("from2"));

  let weightDelta = (val("new1")-val("orig1"))
                  + (val("new2")-val("orig2"));

  let newWeight = total + weightDelta;

  let newPct = (moment + delta)/(newWeight*wb) * 100;
  let change = newPct - (pct*100);

  document.getElementById("frontResult").innerText = newPct.toFixed(1)+"%";
  document.getElementById("changeResult").innerText = change.toFixed(1)+"%";
  document.getElementById("weightResult").innerText = newWeight.toFixed(0)+" lb";
}

document.querySelectorAll("input").forEach(i=>{
  i.addEventListener("input",calc);
});

calc();
</script>

</body>
</html>
